<script>
function cambiar(link) {
  let inicio = document.getElementById("inicio");
  let visor = document.getElementById("visor");

  if (link === "") {
    visor.style.display = "none";
    inicio.style.display = "flex";
  } else {
    inicio.style.display = "none";
    visor.style.display = "block";
    visor.src = link;
  }
}

function ocultarTodos() {
  document.getElementById("estimaciones").style.display = "none";
  document.getElementById("informacion").style.display = "none";
}

function mostrar(seccion) {
  ocultarTodos();
  document.getElementById(seccion).style.display = "block";
}

function mostrarPublicacion() {
  ocultarTodos();

  let inicio = document.getElementById("inicio");
  let visor = document.getElementById("visor");

  inicio.style.display = "none";
  visor.style.display = "block";

  visor.src = "https://indetec-tracker.cdhindetec.workers.dev/go?id=publicaciones&src=boton_inicio";
}

function activar(elemento) {
  let items = document.querySelectorAll(".subtitulo");
  items.forEach(el => el.classList.remove("activo"));
  elemento.classList.add("activo");
}

function mostrarPublicaciones() {
  ocultarTodos();

  let inicio = document.getElementById("inicio");
  let visor = document.getElementById("visor");

  inicio.style.display = "none";
  visor.style.display = "block";

  visor.src = "https://app.powerbi.com/view?r=eyJrIjoiYjlmZDZhM2MtYzJlMS00NjExLTk0ZWEtZjg3MWJiMzM5NGYxIiwidCI6IjRhZjM1NGU0LTM0Y2MtNGM0Yy1hY2MwLTIyMmZkMDU1NTZiNiJ9";
}
